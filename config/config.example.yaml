# Discord Webhook RSS Feed Monitor Configuration

# How often to check feeds (in seconds)
refresh_interval: 300

# Delay between fetching separate feeds (in seconds)
# Increase this when a source rate-limits consecutive requests
delay_between_feeds: 0

# Delay between posting multiple updates (in seconds)
# This prevents rate limiting and allows users to read posts
delay_between_posts: 2

# Maximum age of posts to process (in days)
# Set to 0 or omit to process all posts regardless of age
max_post_age_days: 7

# List of feeds to monitor
feeds:
  # Example RSS feed
  - id: "example-tech-blog" # Required: stable and unique; do not change after deployment
    name: "Example Tech Blog"
    url: "https://example.com/feed.xml"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "rss" # Optional: 'rss' (default), 'xenforo', 'itmk_oglasnik', or 'anhoch'
    webhook_name: "RSS Bot" # Optional: Custom name for the webhook
    webhook_avatar: "https://example.com/avatar.png" # Optional: Custom avatar URL
    embed_color: 5814783 # Optional: Components v2 accent color (default: 5814783 = blue)

  # Hacker News RSS with official API enrichment
  - id: "hacker-news"
    name: "Hacker News"
    url: "https://news.ycombinator.com/rss"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "rss"
    adapter: "hackernews"

  # Reddit RSS with outbound/discussion link separation
  - id: "reddit-python"
    name: "r/Python"
    url: "https://www.reddit.com/r/python/.rss"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "rss"
    adapter: "reddit"

  # Public GitHub repository releases feed
  - id: "github-cli-releases"
    name: "GitHub CLI Releases"
    url: "https://github.com/cli/cli/releases.atom"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "rss"

  # Example XenForo forum thread
  - id: "forum-discussion"
    name: "Forum Discussion"
    url: "https://forum.example.com/threads/topic-name.12345/"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "xenforo" # Use XenForo forum scraping strategy
    webhook_name: "Forum Bot"
    embed_color: 3447003 # Optional: Components v2 accent color

  # IT.mk Oglasnik index or category page
  - id: "itmk-oglasnik"
    name: "IT.mk Oglasnik"
    url: "https://forum.it.mk/oglasnik/"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "itmk_oglasnik"
    webhook_name: "Oglasnik Bot"

  # Anhoch new products plus opt-in selling-price monitoring
  - id: "anhoch-new-products"
    name: "Anhoch New Products"
    url: "https://www.anhoch.com/products?inStockOnly=2"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    strategy: "anhoch"
    # Full-catalog selling-price scan every hour. Omit or set null to disable;
    # valid only for Anhoch. The immediate first scan stores a silent baseline.
    price_check_interval: 3600
    webhook_name: "Anhoch Bot"

  # Example feed 2
  - id: "another-feed"
    name: "Another Feed"
    url: "https://another-example.com/rss"
    webhook: "https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN"
    # strategy defaults to 'rss' if not specified
    # webhook_name, webhook_avatar, and embed_color are optional

# Notes:
# - id: Stable unique ID containing lowercase letters, numbers, '.', '_', or '-' (required)
#   Delivery history is keyed by this value, so changing it will make old entries new again.
# - name: A friendly name for the feed (optional, will use feed/forum title if not provided)
# - url: The RSS/Atom feed, XenForo thread, marketplace page, or Anhoch catalog URL (required)
#   Public GitHub release feeds use https://github.com/OWNER/REPOSITORY/releases.atom
#   and render with a GitHub source label. They do not require an adapter.
# - webhook: Discord webhook URL for posting updates (required)
# - strategy: Scraping strategy to use (optional, default: 'rss')
#   - 'rss': For RSS/Atom feeds (default)
#   - 'xenforo': For XenForo forum threads
#   - 'itmk_oglasnik': For IT.mk Oglasnik index and category pages
#   - 'anhoch': For new products from Anhoch's public catalog
# - price_check_interval: Optional seconds between Anhoch full-catalog selling-price scans
#   Set to 3600 for hourly checks. Omit or set to null to disable; it is invalid
#   for non-Anhoch feeds. Full scans use 500 products per page with a 2 MiB
#   response cap, and their immediate first scan creates a silent baseline.
# - adapter: Optional source-specific enrichment for RSS feeds
#   - 'hackernews': Author, points, comments, self-post text, and article domain
#   - 'reddit': Outbound/discussion links and normalized authors without OAuth
# - webhook_name: Custom name for the webhook bot (optional)
# - webhook_avatar: URL to custom avatar image for the webhook bot (optional)
# - embed_color: Decimal color for the Components v2 container accent
#   The legacy key name is retained for compatibility (optional, default: 5814783)
